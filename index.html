<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Bootstrap Website-CSS Frameworks</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    
    <!-- Navbar -->
     <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">My Website</a>

            <ul class="navbar-nav d-flex flex-row">
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Home</a>
                </li>

                <li class="nav-item ms-5">
                    <a class="nav-link text-white" href="#">About</a>
                </li>

                <li class="nav-item ms-5">
                    <a class="nav-link text-white" href="#">Contact</a>
                </li>
            </ul>
        </div>
     </nav>

     <!-- header -->
      <div class="container text-center mt-4">
        <h1 class="text-primary">Welcome to My Website</h1>
        <p>This is my first Bootstrap Webpage</p>
      </div>

      <!-- Cards -->
       <div class="container mt-4">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">My Hobby</h5>
                        <p class="card-text">I enjoy watching movies and surfing on the internet.</p>
                        <button class="btn btn-primary">Read More</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">My Favorite Food</h5>
                        <p class="card-text">I like fried chicken, pizza, and Filipino Foods.</p>
                        <button class="btn btn-success">Read More</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">My Dream</h5>
                        <p class="card-text">I want to become a professsional Front-end Developer.</p>
                        <button class="btn btn-danger">Read More</button>
                    </div>
                </div>
            </div>
        </div>
       </div>
</body>
</html>
